name: Build and Deploy Prod

on:
  workflow_run:
    workflows:
      - Build and Deploy Test
    types:
      - completed
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPO }}
  IMAGE_NAME: flan-t5-api
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}

    steps:
      - name: Deploy on prod VM with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST_PROD }}
          username: ${{ secrets.VM_USER_PROD }}
          key: ${{ secrets.VM_SSH_KEY_PROD }}
          script: |
            mkdir -p /home/${{ secrets.VM_USER_PROD }}/ai-service
            cd /home/${{ secrets.VM_USER_PROD }}/ai-service
            IMAGE_URI='${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/flan-t5-api:${{ env.DEPLOY_SHA }}'
            cat > docker-compose.prod.yml <<EOF
            services:
              app:
                image: "${IMAGE_URI}"
                container_name: flan-t5-api
                ports:
                  - "8000:8000"
                environment:
                  MODEL_NAME: google/flan-t5-base
                  MAX_NEW_TOKENS: "50"
                restart: unless-stopped
            EOF
            docker compose -f docker-compose.prod.yml config
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

      - name: Verify prod API health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST_PROD }}
          username: ${{ secrets.VM_USER_PROD }}
          key: ${{ secrets.VM_SSH_KEY_PROD }}
          script: |
            sleep 10
            curl --fail --silent http://localhost:8000/health
