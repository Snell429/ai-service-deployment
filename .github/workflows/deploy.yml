name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPO }}
  IMAGE_NAME: flan-t5-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image URI
        id: meta
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.image_uri }} .

      - name: Push Docker image
        run: docker push ${{ steps.meta.outputs.image_uri }}

  deploy-vm:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Deploy on VM with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.VM_USER }}/ai-service
            cd /home/${{ secrets.VM_USER }}/ai-service
            IMAGE_URI='${{ needs.build-and-push.outputs.image_uri }}'
            cat > docker-compose.prod.yml <<EOF
            services:
              app:
                image: "${IMAGE_URI}"
                container_name: flan-t5-api
                ports:
                  - "8000:8000"
                environment:
                  MODEL_NAME: google/flan-t5-base
                  MAX_NEW_TOKENS: "50"
                restart: unless-stopped
            EOF
            cat docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml config
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
