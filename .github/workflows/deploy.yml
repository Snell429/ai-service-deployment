name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPO }}
  IMAGE_NAME: flan-t5-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image URI
        id: meta
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.image_uri }} .

      - name: Push Docker image
        run: docker push ${{ steps.meta.outputs.image_uri }}

  deploy-vm:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/${{ secrets.VM_USER }}/ai-service

      - name: Deploy on VM with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.VM_USER }}/ai-service
            cat > /home/${{ secrets.VM_USER }}/ai-service/.env <<EOF
            IMAGE_URI=${{ needs.build-and-push.outputs.image_uri }}
            MODEL_NAME=google/flan-t5-base
            MAX_NEW_TOKENS=50
            EOF
            docker compose --env-file /home/${{ secrets.VM_USER }}/ai-service/.env -f /home/${{ secrets.VM_USER }}/ai-service/docker-compose.prod.yml pull
            docker compose --env-file /home/${{ secrets.VM_USER }}/ai-service/.env -f /home/${{ secrets.VM_USER }}/ai-service/docker-compose.prod.yml up -d
